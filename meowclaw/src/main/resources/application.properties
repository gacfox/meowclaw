spring.application.name=meowclaw
server.address=127.0.0.1
server.port=8080
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
# Base data directory (overridable via MEOWCLAW_DATA_DIR env var)
meowclaw.data-dir=${MEOWCLAW_DATA_DIR:data}
meowclaw.workspace-dir=${meowclaw.data-dir}/workspace
# Datasource
spring.datasource.url=jdbc:h2:file:./${meowclaw.data-dir}/db/meowclaw
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
# SQL Init
spring.sql.init.mode=always
# SpringData JPA
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=none
# JWT
meowclaw.jwt.secret=MeowClaw2026SecretKeyForJwtTokenSigningMustBeLongEnough
meowclaw.jwt.expire-hours=72
