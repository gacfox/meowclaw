spring.application.name=meowclaw
server.address=127.0.0.1
server.port=8080

jwt.secret=${JWT_SECRET:meowclaw-default-secret-key-change-it-in-production}
jwt.expiration=${JWT_EXPIRATION:86400000}

sqlite.database=${SQLITE_DATABASE:./data/meowclaw.db}

storage.path=${STORAGE_PATH:./data/files}
storage.url-prefix=${STORAGE_URL_PREFIX:/api/files}

agent.workspace.base-dir=${AGENT_WORKSPACE_BASE_DIR:./data/workspaces}
skills.storage-dir=${SKILLS_STORAGE_DIR:./data/skills}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
